<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;font-family:monospace">

<h1 style="text-align:center;">🔥 PANEL PRO MAX</h1>

<textarea id="urls" style="width:100%;height:120px;"></textarea><br><br>

<button onclick="scan()">🚀 ESCANEAR</button>
<button onclick="download()">📥 EXPORTAR</button>

<pre id="resultados"></pre>

<script>

let resultados = []

async function scan(){
    let urls = document.getElementById("urls").value.split("\n")
    let div = document.getElementById("resultados")

    div.textContent = "⏳ Escaneando...\n\n"
    resultados = []

    for(let url of urls){
        url = url.trim()
        if(!url) continue

        div.textContent += "🔎 " + url + "\n"

        let res = await fetch("/scan",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({urls:url})
        })

        let data = await res.json()

        if(data.length > 0){
            let c = data[0]
            resultados.push(c)

            div.textContent += `
╭───✦ HIT HUNTER
├ USER: ${c.user}
├ PASS: ${c.pass}
├ EXP: ${c.exp}
├ COUNTRY: ${c.pais}
├ ISP: ${c.isp}
├ LATENCY: ${c.latency} ms
├ CHANNELS: ${c.canales}
╰───✦

`
        } else {
            div.textContent += "❌ INVALID\n\n"
        }

        div.scrollTop = div.scrollHeight
    }
}

async function download(){
    let res = await fetch("/export",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(resultados)
    })

    let blob = await res.blob()
    let a = document.createElement("a")
    a.href = URL.createObjectURL(blob)
    a.download = "hits.txt"
    a.click()
}

</script>

</body>
</html>
