<!DOCTYPE html>
<html>
<body style="background:black;color:#00ffcc;font-family:monospace;text-align:center">

<h1>⚡ PANEL PRO ⚡</h1>

<textarea id="urls" style="width:90%;height:120px;"></textarea><br><br>

<button onclick="add()">➕ Añadir</button>
<button onclick="start()">✅ Verificar</button>

<h2>RESULTADOS</h2>
<div id="results"></div>

<script>
function add(){
fetch("/add",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({urls:document.getElementById("urls").value})
}).then(()=>{
document.getElementById("urls").value = ""; // limpiar
});
}

function start(){
fetch("/verificar");
setInterval(load,2000);
}

function load(){
fetch("/results")
.then(res=>res.json())
.then(data=>{
let html = "";

data.forEach(x=>{
let color = x.estado=="OK" ? "#00ff00" :
            x.estado=="RUN" ? "#ffff00" :
            "#ff0000";

html += `<div style="border:1px solid ${color};margin:10px;padding:10px">
<pre>${x.resultado || "⏳ Verificando..."}</pre>
</div>`;
});

document.getElementById("results").innerHTML = html;
});
}
</script>

</body>
</html>
