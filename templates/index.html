<!DOCTYPE html>
<html>
<body style="background:#0f172a;color:white;text-align:center">

<h1>🚀 PANEL PRO</h1>

<textarea id="urls" style="width:90%;height:100px;"></textarea><br><br>

<button onclick="start()">Añadir y Verificar</button>
<a href="/export"><button>Exportar .txt</button></a>

<h2>Resultados</h2>
<div id="resultados"></div>

<script>

async function start(){

    let urls = document.getElementById("urls").value;

    await fetch("/add",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({urls:urls})
    });

    document.getElementById("urls").value = "";

    await fetch("/scan");

    location.reload();
}

</script>

{% for l in listas %}
<div style="background:#020617;margin:10px;padding:10px;white-space:pre-line;">
{{l[3] if l[3] else "❌ ERROR"}}
</div>
{% endfor %}

</body>
</html>
